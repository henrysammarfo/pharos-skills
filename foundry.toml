[profile.default]
src = "src"
out = "out"
libs = ["lib"]
cache_path = "forge-cache"
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = false
fs_permissions = [{ access = "read", path = "./"}]

[profile.ci]
fuzz = { runs = 256 }
invariant = { runs = 64 }

[rpc_endpoints]
atlantic = "https://atlantic.dplabs-internal.com"

[etherscan]
atlantic = { key = "${PHAROSCAN_API_KEY}", url = "https://api.socialscan.io/pharos-atlantic-testnet/v1/explorer/command_api/contract", chain = 688689 }
